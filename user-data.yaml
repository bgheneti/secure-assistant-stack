#cloud-config
# =============================================================================
# user-data — provisions ONE Ubuntu 24.04 host running the ENTIRE assistant
# stack as Docker Compose services (supporting stack + ZeroClaw tiers + DinD).
#
# Same file works for: Multipass (Mac dev) AND an Unraid KVM VM (prod) -> parity.
# Interactive bits (OneCLI vault creds, ZeroClaw onboard, channel pairing) are
# NOT automated — cloud-init preps everything up to that point.
#
# -----------------------------------------------------------------------------
# LAUNCH ON A MAC WITH MULTIPASS (use the helper — it injects your SSH key + .env):
#   ./launch-multipass.sh                 # reads ./.env, renders cloud-init, launches
#   # what it does for you: substitutes __SSH_PUBLIC_KEY__ from .env into the
#   # cloud-init, `multipass launch ... --cloud-init <rendered>`, waits for boot,
#   # then TRANSFERS your local ./.env into /opt/assistant-stack/.env over multipass's
#   # channel (so secrets never enter cloud-init metadata).
#   multipass shell assistant            # get a shell on the VM
#   multipass info assistant             # note the IPv4 (for the ssh tunnel below)
#
# >>> SECRETS NOTE: the SSH public key is the only thing rendered into cloud-init
#     (it's public). Your .env (secrets) is transferred AFTER boot over multipass's
#     local channel and lands at /opt/assistant-stack/.env (0600, owner assistant) —
#     it is NOT baked into the cloud-init datasource.
#
# WHY A VM (vs bare Docker Desktop on the Mac):
#   * `internal: true` dashboards are reachable on-box (no LinuxKit/vpnkit hop) —
#     the localhost:10254 refusal disappears; the admin-net hack is unneeded here.
#   * the 5-A spawn-containment crux behaves like prod (same engine/kernel).
#   * volumes are native ext4 -> HARD-WON LESSON #2's bind-mount corruption N/A.
#   * you exercise THIS provisioning path, on Ubuntu 24.04, exactly like Unraid.
#
# REACH DASHBOARDS FROM THE MAC (VM dashboards bind VM-loopback):
#   ssh -L 10254:127.0.0.1:10254 -L 3002:127.0.0.1:3002 assistant@<vm-ipv4>
#   # then browse http://localhost:10254 (OneCLI) / :3002 (unrestricted) on the Mac
#
# DO NOT `multipass mount ~/stack` and run from it — that is the SSHFS/9p trap
# (LESSON #2). cloud-init clones the repo ONTO the VM's native disk; edit there
# (or edit on the Mac and git push/pull), never bind-mount the Mac FS as runtime.
#
# >>> TEE CHECK: PrivateMode does REMOTE enclave attestation over the network, so
#     running the proxy inside a (nested) VM should be fine — but VERIFY the TEE
#     chain still attests from inside Multipass; don't assume.
# =============================================================================

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - git
  - jq
  - make

users:
  - default                      # KEEP: multipass relies on the `ubuntu` user for `exec`
  - name: assistant
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    # Injected by launch-multipass.sh from SSH_PUBLIC_KEY in your local .env.
    # (If you run `multipass launch --cloud-init user-data.yaml` directly, this
    #  token stays literal and SSH won't work — use launch-multipass.sh.)
    ssh_authorized_keys:
      - __SSH_PUBLIC_KEY__

write_files:
  - path: /etc/profile.d/assistant.sh
    content: |
      export STACK_DIR=/opt/assistant-stack

  # post-provision helper: brings the stack up + builds the sandbox image.
  - path: /opt/bring-up.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      : "${STACK_DIR:=/opt/assistant-stack}"
      cd "$STACK_DIR"

      echo "== 1. .env =="
      if [ ! -f .env ]; then cp .env.example .env; fi
      set -a; source .env; set +a
      if grep -q 'REPLACE\|change-me' .env; then
        echo "  WARN: .env still has REPLACE/change-me placeholders."
        echo "  (bring-up will still start the supporting stack so you can create OneCLI identities)"
      fi

      echo "== 2. Generate tier definitions from tiers.yaml =="
      export COMPOSE_FILE=docker-compose.yml:docker-compose.tiers.yml
      python3 scripts/generate-tiers.py

      echo "== 3. Supporting stack (waits for health) =="
      docker compose up -d --wait \
        squid onecli-db onecli litellm privatemode-proxy

      echo "== 4. Export OneCLI CA cert to shared volume =="
      _i=0; _max=15
      while [ $_i -lt $_max ]; do
        if docker exec onecli test -f /app/data/gateway/ca.pem 2>/dev/null; then
          docker exec -u 0 onecli mkdir -p /data/ca
          docker exec -u 0 onecli cp /app/data/gateway/ca.pem /data/ca/ca.pem
          docker exec -u 0 onecli cp /app/data/gateway/ca.key /data/ca/ca.key
          docker exec -u 0 onecli chown root:root /data/ca/ca.pem /data/ca/ca.key
          echo "  CA cert exported."
          break
        fi
        _i=$((_i + 1))
        echo "  waiting for OneCLI to generate CA... ($_i/$_max)"
        sleep 2
      done

      echo "== 5. Agent tiers + optional DinD =="
      docker compose up -d
      echo "  (all services started — check 'docker compose ps')"

      echo "== 6. Inject secrets into per-tier config.toml =="
      _ok=1
      # collect placeholder tokens from generated configs
      _vars_needed="LITELLM_MASTER_KEY"
      for _cf in zeroclaw/*/config.toml; do
        [ -f "$_cf" ] || continue
        _vars_needed="$_vars_needed $(sed -n 's/.*Bearer \([A-Z_]*\).*/\1/p' "$_cf")"
      done
      _vars_needed=$(echo "$_vars_needed" | tr ' ' '\n' | sort -u)
      for _var in $_vars_needed; do
        eval "_val=\${$_var:-}"
        case "$_val" in REPLACE*|''|change-me*)
          echo "  WARN: $_var is empty or placeholder — skipping config injection"
          _ok=0; break ;;
        esac
      done
      if [ "$_ok" -eq 1 ]; then
        _sed_cmd="sed"
        for _var in $_vars_needed; do
          eval "_val=\$$_var"
          _sed_cmd="$_sed_cmd -e \"s|$_var|$_val|g\""
        done
        for _cf in zeroclaw/*/config.toml; do
          _tier=$(basename "$(dirname "$_cf")")
          [ -f "$_cf" ] || { echo "  !! $_cf missing — skipping $_tier"; continue; }
          eval "$_sed_cmd '$_cf' > \"/tmp/conf-$_tier.toml\""
          docker cp "/tmp/conf-$_tier.toml" "zeroclaw-$_tier:/zeroclaw-data/.zeroclaw/config.toml"
        done
        docker compose restart zeroclaw-*
      fi

      echo "== 7. Build the tool sandbox INSIDE the dind =="
      # Build containers live on dind's nested bridge where the `squid` hostname
      # does NOT resolve. Pass squid's assistant-net IP as BuildKit proxy build-
      # args so apk can reach packages.wolfi.dev. Registries/CDNs must be in
      # squid/allowlist.txt.
      if docker ps --format '{{.Names}}' | grep -q dind-unrestricted; then
        _squid_ip=$(docker inspect squid --format '{{range $k,$v := .NetworkSettings.Networks}}{{if eq $k "assistant-net"}}{{$v.IPAddress}}{{end}}{{end}}')
        docker exec -i dind-unrestricted docker build \
          --build-arg "HTTP_PROXY=http://$_squid_ip:3128" \
          --build-arg "HTTPS_PROXY=http://$_squid_ip:3128" \
          --build-arg "NO_PROXY=localhost,127.0.0.1" \
          -t assistant-sandbox:1 - < Dockerfile.sandbox \
          && docker exec dind-unrestricted docker images | grep assistant-sandbox \
          || echo "  !! sandbox build failed — check squid allowlist has the registry + Dockerfile digest"
      else
        echo "  (no dind-unrestricted — skip sandbox build; see tiers.yaml build_sandbox)"
      fi

      echo "== NEXT (interactive) =="
      echo "  1. OneCLI dashboard  http://localhost:10254"
      echo "     - Create identities matching tiers.yaml -> copy tokens to .env"
      echo "  2. After .env update, re-run: /opt/bring-up.sh"
      echo "     (config injection and CA export re-run; containers restart)"
      echo "  3. Verify: docker compose exec zeroclaw-updates zeroclaw doctor"
      echo "  4. Channels: docker compose exec zeroclaw-updates zeroclaw channel start"
      echo "  5. Verify: bash $STACK_DIR/scripts/preflight.sh"

runcmd:
  # ---- Docker Engine + compose plugin (official convenience script) ----------
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable --now docker
  # ---- fetch the stack -------------------------------------------------------
  - mkdir -p /opt && chown assistant:assistant /opt
  # Clone from GitHub (or receive transferred local state from launch-multipass.sh).
  # launch-multipass.sh --local transfers the repo via multipass after boot, so the
  # clone below is skipped if /opt/assistant-stack already exists.
  - test -d /opt/assistant-stack || sudo -u assistant git clone https://github.com/bgheneti/zeroclaw-secure-stack.git /opt/assistant-stack
  # ---- .env: template fallback now; launch-multipass.sh TRANSFERS your real .env
  #      over multipass's channel after boot (so secrets never enter cloud-init) ----
  - cd /opt/assistant-stack && test -f .env || sudo -u assistant cp .env.example .env
  # NOTE: zeroclaw config.toml templates are owned by assistant; the data volumes
  # are managed by Docker, so no chown needed.
  # ---- friendly next-steps banner --------------------------------------------
  - echo "Run /opt/bring-up.sh  (launch-multipass.sh transfers your real .env in after boot)" > /etc/motd

# After boot:
#   multipass shell assistant   (or  ssh assistant@<vm-ipv4>)
#   bash /opt/bring-up.sh        # .env was seeded from your local copy by the wrapper
# =============================================================================
# NOTE: no Node, no pnpm, no Claude Code, no NanoClaw host process. ZeroClaw is a
# container the compose pulls. The old finish-nanoclaw-setup.sh is deleted.
# =============================================================================
