# =============================================================================
# LiteLLM — local model gateway in front of the PrivateMode TEE proxy.
# Privacy-first: prompt logging OFF, no external callbacks.
# The agent talks to LiteLLM; LiteLLM talks to PrivateMode.
# =============================================================================

model_list:
  - model_name: assistant
    litellm_params:
      model: openai/gpt-oss-120b   # e.g. openai/privatemode-llama-3-1-70b
      api_base: http://privatemode-proxy:8080/v1
      api_key: os.environ/PRIVATEMODE_API_KEY
  - model_name: thinker
    litellm_params:
      model: litellm_proxy/kimi-latest   # e.g. openai/privatemode-llama-3-1-70b
      api_base: http://privatemode-proxy:8080/v1
      api_key: os.environ/PRIVATEMODE_API_KEY

litellm_settings:
  turn_off_message_logging: false   # no prompt/response content in logs (privacy)
  telemetry: false                  # no call-home to LiteLLM

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
