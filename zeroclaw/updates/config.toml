[gateway]
port = 42617
host = "[::]"
allow_public_bind = true
allow_remote_admin = true

[risk_profiles.default]
allowed_commands = []
auto_approve = ["memory_recall", "calculator", "glob_search", "content_search", "image_info", "weather", "tool_search"]
block_high_risk_commands = true
forbidden_paths = ["/etc", "/root", "/home", "/usr", "/bin", "/sbin", "/lib", "/opt", "/boot", "/dev", "/proc", "/sys", "/var", "/tmp", "~/.ssh", "~/.gnupg", "~/.aws", "~/.config"]
level = "supervised"
require_approval_for_medium_risk = true
workspace_only = true

[agents.default]
delegate_same_risk_profile = true
enabled = true
model_provider = "litellm.assistant"
risk_profile = "default"
runtime_profile = "default"

[agents.default.identity]
format = "openclaw"

[providers]

[agents.default.memory]
backend = "sqlite"

[providers.models]

[agents.default.workspace]
unrestricted_filesystem = false

[providers.models.litellm]

[providers.models.litellm.assistant]
uri = "http://litellm:4000"
model = "assistant"
think = true
api_key = "LITELLM_MASTER_KEY"

[providers.models.litellm.thinker]
uri = "http://litellm:4000"
model = "thinker"
api_key = "LITELLM_MASTER_KEY"

[agents]
